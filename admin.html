<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Lira Machado</title>
<!-- Impede indexação por buscadores -->
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8924A; --gold-light: #E8A85C;
    --dark: #0A0A0A; --dark-2: #111111; --dark-3: #1A1A1A; --dark-4: #222222;
    --muted: #555; --muted-2: #777; --white: #FAFAF8;
    --teal: #1A9E8F;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--dark); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

  /* ── LOGIN SCREEN ─────────────────────────────────────────────────────── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: var(--dark);
  }
  .login-box {
    background: var(--dark-2); padding: 64px 56px;
    min-width: 380px; border: 1px solid rgba(200,146,74,0.2);
    text-align: center;
  }
  .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; margin-bottom: 4px; }
  .login-logo span { color: var(--gold); font-style: italic; }
  .login-sub { font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 48px; }
  .login-field { position: relative; margin-bottom: 12px; }
  .login-field input {
    width: 100%; background: var(--dark-3); border: 1px solid rgba(255,255,255,0.08);
    color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px;
    padding: 16px 20px; text-align: center; letter-spacing: 0.2em;
    transition: border-color 0.3s;
  }
  .login-field input:focus { outline: none; border-color: var(--gold); }
  .btn-login {
    width: 100%; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.25em; text-transform: uppercase;
    background: var(--gold); color: var(--dark); border: none;
    padding: 18px; cursor: pointer; margin-top: 8px; transition: background 0.3s;
  }
  .btn-login:hover { background: var(--gold-light); }
  .login-error { font-size: 12px; color: #e05; margin-top: 16px; min-height: 16px; font-family: 'Syne', sans-serif; letter-spacing: 0.1em; }

  /* ── ADMIN SHELL ──────────────────────────────────────────────────────── */
  #adminShell { display: none; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.97); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(200,146,74,0.12);
    padding: 16px 48px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--white); text-decoration: none; }
  .nav-logo span { color: var(--gold); font-style: italic; }
  .nav-badge { font-family: 'Syne', sans-serif; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; background: rgba(200,146,74,0.12); color: var(--gold); border: 1px solid rgba(200,146,74,0.25); padding: 5px 14px; }
  .nav-actions { display: flex; gap: 12px; align-items: center; }
  .nav-link { font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted-2); text-decoration: none; transition: color 0.3s; }
  .nav-link:hover { color: var(--gold); }
  .btn-logout { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; background: none; color: var(--muted); border: 1px solid rgba(255,255,255,0.08); padding: 8px 16px; cursor: pointer; transition: all 0.3s; }
  .btn-logout:hover { border-color: #e05; color: #e05; }

  .admin-wrap { padding: 48px; max-width: 1200px; margin: 0 auto; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: rgba(200,146,74,0.08); margin-bottom: 48px; }
  .stat-card { background: var(--dark-2); padding: 28px 32px; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; color: var(--white); line-height: 1; }
  .stat-num span { color: var(--gold); }
  .stat-label { font-family: 'Syne', sans-serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

  /* HEADER BAR */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; }
  .section-title em { font-style: italic; color: var(--gold); }
  .btn-new { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; background: var(--gold); color: var(--dark); border: none; padding: 14px 28px; cursor: pointer; transition: background 0.3s; }
  .btn-new:hover { background: var(--gold-light); }

  /* EDITOR CARD */
  #editor { display: none; background: var(--dark-2); padding: 40px; margin-bottom: 40px; border: 1px solid rgba(200,146,74,0.25); }
  #editor.active { display: block; }
  .editor-heading { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
  .editor-heading::after { content: ''; flex: 1; height: 1px; background: rgba(200,146,74,0.2); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group.thirds { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  label { font-family: 'Syne', sans-serif; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); }
  input[type="text"], input[type="password"], textarea, select {
    background: var(--dark-3); border: 1px solid rgba(255,255,255,0.07);
    color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 300;
    padding: 12px 16px; transition: border-color 0.3s; resize: vertical;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--gold); }
  select option { background: var(--dark-3); }
  textarea { min-height: 120px; }
  #contentEditor { min-height: 320px; font-size: 14px; line-height: 1.8; font-family: 'DM Sans', monospace; }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .toolbar-btn { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; background: var(--dark-4); color: var(--muted-2); border: 1px solid rgba(255,255,255,0.06); padding: 7px 14px; cursor: pointer; transition: all 0.2s; }
  .toolbar-btn:hover { background: var(--gold); color: var(--dark); border-color: var(--gold); }

  .cover-preview { width: 100%; height: 180px; object-fit: cover; display: none; margin-top: 10px; border: 1px solid rgba(200,146,74,0.2); }
  .cover-preview.show { display: block; }

  .result-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 8px; }
  .result-pair { display: flex; flex-direction: column; gap: 8px; }
  .result-pair input { text-align: center; }
  .result-pair label { text-align: center; }

  .form-actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05); }
  .btn-save { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; background: var(--gold); color: var(--dark); border: none; padding: 16px 36px; cursor: pointer; transition: background 0.3s; }
  .btn-save:hover { background: var(--gold-light); }
  .btn-publish { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; background: var(--teal); color: var(--white); border: none; padding: 16px 36px; cursor: pointer; transition: background 0.3s; }
  .btn-publish:hover { background: #15806e; }
  .btn-cancel { font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; background: none; color: var(--muted-2); border: 1px solid rgba(255,255,255,0.1); padding: 16px 28px; cursor: pointer; transition: all 0.3s; }
  .btn-cancel:hover { border-color: var(--muted-2); color: var(--white); }

  /* TABLE */
  .cases-table-wrap { background: var(--dark-2); border: 1px solid rgba(255,255,255,0.04); }
  table { width: 100%; border-collapse: collapse; }
  th { font-family: 'Syne', sans-serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); padding: 16px 20px; text-align: left; border-bottom: 1px solid rgba(200,146,74,0.15); background: rgba(200,146,74,0.03); }
  td { padding: 18px 20px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.015); }
  .td-title { font-weight: 400; }
  .td-excerpt { font-size: 12px; color: var(--muted-2); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

  .status-badge { font-family: 'Syne', sans-serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; padding: 5px 12px; display: inline-block; }
  .status-published { background: rgba(26,158,143,0.12); color: #1A9E8F; border: 1px solid rgba(26,158,143,0.25); }
  .status-draft { background: rgba(200,146,74,0.1); color: var(--gold); border: 1px solid rgba(200,146,74,0.2); }

  .tbl-actions { display: flex; gap: 8px; }
  .tbl-btn { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--muted-2); padding: 7px 14px; cursor: pointer; transition: all 0.25s; white-space: nowrap; }
  .tbl-btn:hover { border-color: var(--gold); color: var(--gold); }
  .tbl-btn.publish-btn { border-color: rgba(26,158,143,0.3); color: #1A9E8F; }
  .tbl-btn.publish-btn:hover { background: rgba(26,158,143,0.1); }
  .tbl-btn.delete-btn:hover { border-color: #e05; color: #e05; }
  .tbl-btn.preview-btn:hover { border-color: var(--muted-2); color: var(--white); }

  .empty-table { text-align: center; padding: 80px 0; }
  .empty-table p { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; color: rgba(250,250,248,0.25); }

  /* TOAST */
  #toast { position: fixed; bottom: 32px; right: 32px; background: var(--dark-2); border: 1px solid rgba(200,146,74,0.3); color: var(--white); font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.1em; padding: 16px 24px; z-index: 9999; opacity: 0; transform: translateY(12px); transition: all 0.3s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: rgba(26,158,143,0.5); }

  /* MOBILE */
  @media (max-width: 768px) {
    nav { padding: 14px 20px; }
    .admin-wrap { padding: 28px 20px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .result-inputs { grid-template-columns: 1fr; }
    table { font-size: 12px; }
    th, td { padding: 12px; }
    .tbl-actions { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Lira <span>Machado</span></div>
    <div class="login-sub">Área Restrita</div>
    <div class="login-field">
      <input type="password" id="loginPw" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- ── ADMIN SHELL ────────────────────────────────────────────────────────── -->
<div id="adminShell">
  <nav>
    <a href="index.html" class="nav-logo">Lira <span>Machado</span></a>
    <span class="nav-badge">Painel Admin</span>
    <div class="nav-actions">
      <a href="cases.html" target="_blank" class="nav-link">Ver Cases →</a>
      <a href="index.html" class="nav-link">Portfólio</a>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </nav>

  <div class="admin-wrap">

    <!-- STATS -->
    <div class="stats-row" id="statsRow"></div>

    <!-- SECTION HEADER -->
    <div class="section-header">
      <h2 class="section-title">Gerenciar <em>Cases</em></h2>
      <button class="btn-new" onclick="openEditor()">+ Novo Case</button>
    </div>

    <!-- EDITOR -->
    <div id="editor">
      <div class="editor-heading" id="editorHeading">Novo Case</div>
      <div class="form-grid">

        <div class="form-group">
          <label>Título *</label>
          <input type="text" id="fTitle" placeholder="Ex: Rebranding — Meraki Capital" />
        </div>

        <div class="form-group">
          <label>Categoria</label>
          <input type="text" id="fCategory" placeholder="Branding, Marketing, Audiovisual..." />
        </div>

        <div class="form-group">
          <label>Cliente</label>
          <input type="text" id="fClient" placeholder="Nome da empresa ou pessoa" />
        </div>

        <div class="form-group">
          <label>Ano / Período</label>
          <input type="text" id="fDate" placeholder="2024" />
        </div>

        <div class="form-group full">
          <label>Resumo (aparece nos cards) *</label>
          <textarea id="fExcerpt" placeholder="2 a 3 linhas descrevendo o case." style="min-height:80px;"></textarea>
        </div>

        <div class="form-group full">
          <label>Imagem de Capa</label>
          <input type="text" id="fCoverUrl" placeholder="Cole a URL da imagem" oninput="previewCover(this.value)" />
          <input type="file" id="fCoverFile" accept="image/*" onchange="loadFile(this)" style="margin-top:8px; font-size:12px; color:var(--muted-2);" />
          <img id="coverPreview" class="cover-preview" alt="preview" />
        </div>

        <div class="form-group full">
          <label>Conteúdo completo</label>
          <div class="toolbar">
            <button class="toolbar-btn" onclick="ins('h2')">H2 Título</button>
            <button class="toolbar-btn" onclick="ins('h3')">H3 Subtítulo</button>
            <button class="toolbar-btn" onclick="ins('p')">§ Parágrafo</button>
            <button class="toolbar-btn" onclick="ins('blockquote')">❝ Citação</button>
            <button class="toolbar-btn" onclick="insBold()"><b>Negrito</b></button>
            <button class="toolbar-btn" onclick="insHr()">— Divisor</button>
          </div>
          <textarea id="contentEditor" placeholder="Escreva o conteúdo aqui. Use HTML básico: <h2>, <h3>, <p>, <blockquote>, <strong>, <hr>.&#10;&#10;Exemplo:&#10;<h2>O Desafio</h2>&#10;<p>Descrição do problema que o cliente enfrentava...</p>&#10;&#10;<h3>Nossa Abordagem</h3>&#10;<p>Como trabalhamos para resolver...</p>&#10;&#10;<blockquote>Resultado que superou expectativas.</blockquote>"></textarea>
        </div>

        <div class="form-group full">
          <label>Resultados em destaque (opcional)</label>
          <div class="result-inputs">
            <div class="result-pair">
              <label>Número 1</label>
              <input type="text" id="r1n" placeholder="45%" />
              <label>Descrição</label>
              <input type="text" id="r1l" placeholder="Aumento de audiência" />
            </div>
            <div class="result-pair">
              <label>Número 2</label>
              <input type="text" id="r2n" placeholder="3x" />
              <label>Descrição</label>
              <input type="text" id="r2l" placeholder="Crescimento de leads" />
            </div>
            <div class="result-pair">
              <label>Número 3</label>
              <input type="text" id="r3n" placeholder="12" />
              <label>Descrição</label>
              <input type="text" id="r3l" placeholder="Meses de parceria" />
            </div>
          </div>
        </div>

      </div>
      <div class="form-actions">
        <button class="btn-save" onclick="saveCase(false)">💾 Salvar Rascunho</button>
        <button class="btn-publish" onclick="saveCase(true)">🚀 Publicar</button>
        <button class="btn-cancel" onclick="closeEditor()">Cancelar</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="cases-table-wrap" id="tableWrap"></div>

  </div>
</div>

<div id="toast"></div>

<script>
(function() {
  var PASS = 'lirabox2026'; // ← altere para sua senha
  var KEY  = 'lirabox_cases';
  var editId = null;

  // ── AUTH ──────────────────────────────────────────────────────────────────
  function checkSession() {
    if (sessionStorage.getItem('lira_admin') === 'true') showAdmin();
  }

  window.doLogin = function() {
    var pw = document.getElementById('loginPw').value;
    if (pw === PASS) {
      sessionStorage.setItem('lira_admin', 'true');
      showAdmin();
    } else {
      var err = document.getElementById('loginErr');
      err.textContent = 'Senha incorreta. Tente novamente.';
      document.getElementById('loginPw').value = '';
      setTimeout(function() { err.textContent = ''; }, 3000);
    }
  };

  document.getElementById('loginPw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  window.logout = function() {
    sessionStorage.removeItem('lira_admin');
    location.reload();
  };

  function showAdmin() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminShell').style.display  = 'block';
    renderStats();
    renderTable();
  }

  // ── DATA ──────────────────────────────────────────────────────────────────
  function get() { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
  function set(data) { localStorage.setItem(KEY, JSON.stringify(data)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  // ── STATS ─────────────────────────────────────────────────────────────────
  function renderStats() {
    var all = get();
    var pub = all.filter(function(c) { return c.published; });
    var cats = [...new Set(all.map(function(c) { return c.category; }).filter(Boolean))];
    document.getElementById('statsRow').innerHTML = [
      { num: all.length,  label: 'Total de cases' },
      { num: pub.length,  label: 'Publicados' },
      { num: all.length - pub.length, label: 'Rascunhos' },
      { num: cats.length, label: 'Categorias' },
    ].map(function(s) {
      return '<div class="stat-card"><div class="stat-num">' + s.num + '<span>.</span></div><div class="stat-label">' + s.label + '</div></div>';
    }).join('');
  }

  // ── TABLE ─────────────────────────────────────────────────────────────────
  function renderTable() {
    var cases = get();
    var wrap  = document.getElementById('tableWrap');
    if (cases.length === 0) {
      wrap.innerHTML = '<div class="empty-table"><p>Nenhum case cadastrado ainda.<br>Clique em "+ Novo Case" para começar.</p></div>';
      return;
    }
    wrap.innerHTML = '<table><thead><tr>' +
      '<th>Case</th><th>Categoria</th><th>Data</th><th>Status</th><th>Ações</th>' +
      '</tr></thead><tbody>' +
      cases.map(function(c) {
        return '<tr>' +
          '<td><div class="td-title">' + c.title + '</div><div class="td-excerpt">' + (c.excerpt || '') + '</div></td>' +
          '<td>' + (c.category || '—') + '</td>' +
          '<td>' + (c.date || '—') + '</td>' +
          '<td><span class="status-badge ' + (c.published ? 'status-published' : 'status-draft') + '">' + (c.published ? '● Publicado' : '○ Rascunho') + '</span></td>' +
          '<td><div class="tbl-actions">' +
            '<button class="tbl-btn" onclick="edit(\'' + c.id + '\')">Editar</button>' +
            '<button class="tbl-btn publish-btn" onclick="togglePub(\'' + c.id + '\')">' + (c.published ? 'Despublicar' : 'Publicar') + '</button>' +
            '<button class="tbl-btn preview-btn" onclick="window.open(\'cases.html#case-' + c.id + '\',\'_blank\')">Preview</button>' +
            '<button class="tbl-btn delete-btn" onclick="del(\'' + c.id + '\')">Excluir</button>' +
          '</div></td></tr>';
      }).join('') +
      '</tbody></table>';
  }

  // ── EDITOR ────────────────────────────────────────────────────────────────
  window.openEditor = function() {
    editId = null;
    document.getElementById('editorHeading').textContent = 'Novo Case';
    ['fTitle','fCategory','fClient','fDate','fExcerpt','fCoverUrl','contentEditor',
     'r1n','r1l','r2n','r2l','r3n','r3l'].forEach(function(id) {
      document.getElementById(id).value = id === 'fDate' ? new Date().getFullYear() : '';
    });
    document.getElementById('coverPreview').classList.remove('show');
    document.getElementById('editor').classList.add('active');
    document.getElementById('editor').scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  window.closeEditor = function() {
    document.getElementById('editor').classList.remove('active');
    editId = null;
  };

  window.edit = function(id) {
    var c = get().find(function(x) { return x.id === id; });
    if (!c) return;
    editId = id;
    document.getElementById('editorHeading').textContent = 'Editando: ' + c.title;
    document.getElementById('fTitle').value       = c.title    || '';
    document.getElementById('fCategory').value    = c.category || '';
    document.getElementById('fClient').value      = c.client   || '';
    document.getElementById('fDate').value        = c.date     || '';
    document.getElementById('fExcerpt').value     = c.excerpt  || '';
    document.getElementById('fCoverUrl').value    = c.cover    || '';
    document.getElementById('contentEditor').value= c.content  || '';
    if (c.results) {
      ['r1','r2','r3'].forEach(function(r, i) {
        document.getElementById(r+'n').value = c.results[i] ? c.results[i].num   || '' : '';
        document.getElementById(r+'l').value = c.results[i] ? c.results[i].label || '' : '';
      });
    }
    if (c.cover) { var p = document.getElementById('coverPreview'); p.src = c.cover; p.classList.add('show'); }
    document.getElementById('editor').classList.add('active');
    document.getElementById('editor').scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  window.saveCase = function(publish) {
    var title = document.getElementById('fTitle').value.trim();
    if (!title) { toast('⚠ O título é obrigatório.', false); return; }
    var cases = get();
    var obj = {
      id:        editId || uid(),
      title:     title,
      category:  document.getElementById('fCategory').value.trim(),
      client:    document.getElementById('fClient').value.trim(),
      date:      document.getElementById('fDate').value.trim(),
      excerpt:   document.getElementById('fExcerpt').value.trim(),
      cover:     document.getElementById('fCoverUrl').value.trim(),
      content:   document.getElementById('contentEditor').value.trim(),
      published: publish,
      results: [
        { num: document.getElementById('r1n').value.trim(), label: document.getElementById('r1l').value.trim() },
        { num: document.getElementById('r2n').value.trim(), label: document.getElementById('r2l').value.trim() },
        { num: document.getElementById('r3n').value.trim(), label: document.getElementById('r3l').value.trim() },
      ]
    };
    if (editId) {
      var idx = cases.findIndex(function(x) { return x.id === editId; });
      cases[idx] = obj;
    } else {
      cases.unshift(obj);
    }
    set(cases);
    closeEditor();
    renderStats();
    renderTable();
    toast(publish ? '🚀 Case publicado!' : '💾 Rascunho salvo!', true);
  };

  window.togglePub = function(id) {
    var cases = get();
    var c = cases.find(function(x) { return x.id === id; });
    if (!c) return;
    c.published = !c.published;
    set(cases);
    renderStats();
    renderTable();
    toast(c.published ? '✓ Publicado!' : '○ Despublicado.', c.published);
  };

  window.del = function(id) {
    if (!confirm('Excluir este case? Esta ação não pode ser desfeita.')) return;
    set(get().filter(function(x) { return x.id !== id; }));
    renderStats();
    renderTable();
    toast('Case excluído.', false);
  };

  // ── TOOLBAR ───────────────────────────────────────────────────────────────
  window.ins = function(tag) {
    var ta = document.getElementById('contentEditor');
    var s = ta.selectionStart, e = ta.selectionEnd;
    var sel = ta.value.substring(s, e) || 'Texto aqui';
    var txt = '\n<' + tag + '>' + sel + '</' + tag + '>\n';
    ta.setRangeText(txt, s, e, 'end'); ta.focus();
  };
  window.insBold = function() {
    var ta = document.getElementById('contentEditor');
    var s = ta.selectionStart, e = ta.selectionEnd;
    ta.setRangeText('<strong>' + (ta.value.substring(s,e)||'texto') + '</strong>', s, e, 'end'); ta.focus();
  };
  window.insHr = function() {
    var ta = document.getElementById('contentEditor');
    ta.setRangeText('\n<hr>\n', ta.selectionStart, ta.selectionEnd, 'end'); ta.focus();
  };

  // ── COVER ─────────────────────────────────────────────────────────────────
  window.previewCover = function(url) {
    var p = document.getElementById('coverPreview');
    if (url) { p.src = url; p.classList.add('show'); } else { p.classList.remove('show'); }
  };
  window.loadFile = function(input) {
    var file = input.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('fCoverUrl').value = e.target.result;
      previewCover(e.target.result);
    };
    reader.readAsDataURL(file);
  };

  // ── TOAST ─────────────────────────────────────────────────────────────────
  function toast(msg, ok) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (ok ? ' success' : '');
    setTimeout(function() { t.className = ''; }, 3000);
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  checkSession();
})();
</script>
</body>
</html>
