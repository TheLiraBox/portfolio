<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cases de Sucesso — Lira Machado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8924A; --gold-light: #E8A85C;
    --dark: #0A0A0A; --dark-2: #111111; --dark-3: #1A1A1A; --dark-4: #222222;
    --muted: #555; --muted-2: #777; --white: #FAFAF8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--dark); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 20px 60px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,10,0.95); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(200,146,74,0.1);
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.1em; color: var(--white); text-decoration: none; }
  .nav-logo span { color: var(--gold); }
  .nav-back { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-2); text-decoration: none; transition: color 0.3s; display: flex; align-items: center; gap: 8px; }
  .nav-back:hover { color: var(--gold); }

  /* PAGE HERO */
  .page-hero {
    padding: 160px 60px 80px;
    background: var(--dark-2);
    border-bottom: 1px solid rgba(200,146,74,0.08);
  }
  .page-hero-label { font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .page-hero-label::before { content: ''; display: block; width: 24px; height: 1px; background: var(--gold); }
  .page-hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(44px, 6vw, 80px); font-weight: 300; line-height: 1; }
  .page-hero-title em { font-style: italic; color: var(--gold); }
  .page-hero-sub { font-size: 15px; color: rgba(250,250,248,0.5); margin-top: 20px; max-width: 500px; line-height: 1.8; }

  /* FILTERS */
  .filters { padding: 32px 60px; display: flex; gap: 12px; flex-wrap: wrap; background: var(--dark); border-bottom: 1px solid rgba(255,255,255,0.05); }
  .filter-btn { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; padding: 9px 20px; border: 1px solid rgba(255,255,255,0.1); background: none; color: var(--muted-2); cursor: pointer; transition: all 0.3s; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); }

  /* CASES GRID */
  .cases-grid-section { padding: 60px 60px 120px; }
  .cases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: rgba(200,146,74,0.06); }
  .case-card {
    background: var(--dark-2); overflow: hidden; cursor: pointer;
    transition: background 0.3s; text-decoration: none; color: var(--white); display: block;
  }
  .case-card:hover { background: var(--dark-3); }
  .case-card-img { width: 100%; height: 240px; object-fit: cover; filter: grayscale(15%); transition: filter 0.4s, transform 0.5s; display: block; }
  .case-card-img-placeholder { width: 100%; height: 240px; background: var(--dark-4); display: flex; align-items: center; justify-content: center; font-size: 48px; color: rgba(200,146,74,0.15); }
  .case-card:hover .case-card-img { filter: grayscale(0%); transform: scale(1.03); }
  .case-card-body { padding: 32px; }
  .case-card-tag { font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .case-card-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 500; line-height: 1.2; margin-bottom: 12px; }
  .case-card-excerpt { font-size: 13px; line-height: 1.7; color: rgba(250,250,248,0.5); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .case-card-footer { padding: 16px 32px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
  .case-card-date { font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .case-card-arrow { color: var(--gold); font-size: 18px; transition: transform 0.3s; }
  .case-card:hover .case-card-arrow { transform: translateX(4px); }
  .cases-empty-state { grid-column: 1/-1; padding: 100px 0; text-align: center; }
  .cases-empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-style: italic; color: rgba(250,250,248,0.3); }

  /* CASE DETAIL VIEW */
  #detailView { display: none; padding: 100px 0 0; }
  #detailView.active { display: block; }
  .detail-hero { height: 60vh; position: relative; overflow: hidden; }
  .detail-hero-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(10%); }
  .detail-hero-placeholder { width: 100%; height: 100%; background: var(--dark-3); display: flex; align-items: center; justify-content: center; font-size: 80px; color: rgba(200,146,74,0.1); }
  .detail-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0.3) 60%, transparent 100%); }
  .detail-hero-meta { position: absolute; bottom: 48px; left: 60px; right: 60px; }
  .detail-tag { font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .detail-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 5vw, 68px); font-weight: 300; line-height: 1; max-width: 800px; }
  .detail-title em { font-style: italic; color: var(--gold); }
  .detail-body { max-width: 800px; margin: 0 auto; padding: 60px 60px 120px; }
  .detail-meta-row { display: flex; gap: 40px; padding-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 48px; }
  .detail-meta-item label { font-family: 'Syne', sans-serif; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; }
  .detail-meta-item span { font-size: 14px; color: rgba(250,250,248,0.8); }
  .detail-content { font-size: 16px; line-height: 1.9; color: rgba(250,250,248,0.7); }
  .detail-content p { margin-bottom: 24px; }
  .detail-content h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: var(--white); margin: 48px 0 20px; }
  .detail-content h3 { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin: 36px 0 16px; }
  .detail-content blockquote { border-left: 2px solid var(--gold); padding: 16px 24px; margin: 32px 0; font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; color: rgba(250,250,248,0.6); }
  .detail-results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(200,146,74,0.1); margin: 48px 0; }
  .detail-result-item { background: var(--dark-2); padding: 28px 24px; text-align: center; }
  .detail-result-num { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; color: var(--gold); line-height: 1; }
  .detail-result-label { font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }
  .detail-back { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); background: none; border: 1px solid rgba(200,146,74,0.4); padding: 14px 28px; cursor: pointer; transition: all 0.3s; margin-bottom: 48px; display: inline-block; }
  .detail-back:hover { background: var(--gold); color: var(--dark); }

  /* FOOTER */
  footer { background: var(--dark-2); border-top: 1px solid rgba(200,146,74,0.1); padding: 32px 60px; display: flex; justify-content: space-between; align-items: center; }
  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; color: var(--white); text-decoration: none; }
  .footer-logo span { color: var(--gold); }
  .footer-copy { font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

  @media (max-width: 900px) {
    nav { padding: 16px 24px; }
    .page-hero { padding: 120px 24px 60px; }
    .filters { padding: 24px; }
    .cases-grid-section { padding: 40px 24px 80px; }
    .cases-grid { grid-template-columns: 1fr; }
    .detail-hero-meta { left: 24px; right: 24px; bottom: 32px; }
    .detail-body { padding: 40px 24px 80px; }
    .detail-meta-row { flex-wrap: wrap; gap: 20px; }
    .detail-results { grid-template-columns: 1fr; }
    .admin-wrap { padding: 100px 24px 60px; }
    .form-grid { grid-template-columns: 1fr; }
    .results-grid-form { grid-template-columns: 1fr; }
    footer { padding: 24px; flex-direction: column; gap: 12px; text-align: center; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">Lira <span>Machado</span></a>
  <a href="index.html" class="nav-back">← Voltar ao portfólio</a>
</nav>

<!-- LISTING VIEW -->
<div id="listingView">
  <div class="page-hero">
    <div class="page-hero-label">Portfólio</div>
    <h1 class="page-hero-title">Cases de<br><em>Sucesso</em></h1>
    <p class="page-hero-sub">Projetos reais, resultados mensuráveis. Uma seleção dos trabalhos que mais impactaram marcas e negócios.</p>
  </div>

  <div class="filters" id="filtersBar">
    <button class="filter-btn active" data-cat="todos">Todos</button>
  </div>

  <section class="cases-grid-section">
    <div class="cases-grid" id="casesGrid">
      <div class="cases-empty-state"><p>Nenhum case publicado ainda.</p></div>
    </div>
  </section>
</div>

<!-- DETAIL VIEW -->
<div id="detailView">
  <button class="detail-back" onclick="showListing()" style="margin: 0 60px 0; display:block; margin-top: 20px;">← Voltar aos cases</button>
  <div class="detail-hero" id="detailHero"></div>
  <div class="detail-body">
    <div class="detail-meta-row" id="detailMeta"></div>
    <div class="detail-content" id="detailContent"></div>
  </div>
</div>


<footer>
  <a href="index.html" class="footer-logo">Lira <span>Machado</span></a>
  <span class="footer-copy">© 2026 Lira Machado</span>
</footer>

<script>
(function() {
  var STORAGE_KEY = 'lirabox_cases';
  function getCases() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }

  function route() {
    var hash = location.hash;
    if (hash.startsWith('#case-')) {
      showDetail(hash.replace('#case-', ''));
    } else {
      showListing();
    }
  }
  window.addEventListener('hashchange', route);
  route();

  window.showListing = function() {
    location.hash = '';
    document.getElementById('listingView').style.display = 'block';
    document.getElementById('detailView').classList.remove('active');
    renderListing('todos');
  };

  function renderListing(cat) {
    var cases = getCases().filter(function(c) { return c.published; });
    var filtered = cat === 'todos' ? cases : cases.filter(function(c) { return c.category === cat; });
    var cats = ['todos'];
    cases.forEach(function(c) { if (c.category && cats.indexOf(c.category) === -1) cats.push(c.category); });
    var filtersBar = document.getElementById('filtersBar');
    filtersBar.innerHTML = cats.map(function(c) {
      return '<button class="filter-btn' + (c === cat ? ' active' : '') + '" data-cat="' + c + '">' + (c === 'todos' ? 'Todos' : c) + '</button>';
    }).join('');
    filtersBar.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { renderListing(this.dataset.cat); });
    });
    var grid = document.getElementById('casesGrid');
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="cases-empty-state"><p>Nenhum case publicado ainda.</p></div>';
      return;
    }
    grid.innerHTML = filtered.map(function(c) {
      var img = c.cover
        ? '<img class="case-card-img" src="' + c.cover + '" alt="' + c.title + '" />'
        : '<div class="case-card-img-placeholder">◈</div>';
      return '<a class="case-card" href="#case-' + c.id + '">' + img +
        '<div class="case-card-body">' +
          '<div class="case-card-tag">' + (c.category || 'Case') + '</div>' +
          '<div class="case-card-title">' + c.title + '</div>' +
          '<div class="case-card-excerpt">' + c.excerpt + '</div>' +
        '</div>' +
        '<div class="case-card-footer">' +
          '<span class="case-card-date">' + (c.date || '') + (c.client ? ' · ' + c.client : '') + '</span>' +
          '<span class="case-card-arrow">→</span>' +
        '</div></a>';
    }).join('');
  }

  function showDetail(id) {
    var c = getCases().find(function(x) { return x.id === id; });
    if (!c) { showListing(); return; }
    document.getElementById('listingView').style.display = 'none';
    document.getElementById('detailView').classList.add('active');
    window.scrollTo(0,0);
    var heroEl = document.getElementById('detailHero');
    heroEl.innerHTML = (c.cover
      ? '<img class="detail-hero-img" src="' + c.cover + '" alt="' + c.title + '" />'
      : '<div class="detail-hero-placeholder">◈</div>') +
      '<div class="detail-hero-overlay"></div>' +
      '<div class="detail-hero-meta">' +
        '<div class="detail-tag">' + (c.category || 'Case') + '</div>' +
        '<h1 class="detail-title">' + c.title + '</h1>' +
      '</div>';
    document.getElementById('detailMeta').innerHTML = [
      c.client   ? '<div class="detail-meta-item"><label>Cliente</label><span>'   + c.client   + '</span></div>' : '',
      c.category ? '<div class="detail-meta-item"><label>Categoria</label><span>' + c.category + '</span></div>' : '',
      c.date     ? '<div class="detail-meta-item"><label>Ano</label><span>'       + c.date     + '</span></div>' : '',
    ].join('');
    var results = '';
    if (c.results && c.results.some(function(r) { return r.num; })) {
      results = '<div class="detail-results">' +
        c.results.filter(function(r) { return r.num; }).map(function(r) {
          return '<div class="detail-result-item"><div class="detail-result-num">' + r.num + '</div><div class="detail-result-label">' + r.label + '</div></div>';
        }).join('') + '</div>';
    }
    document.getElementById('detailContent').innerHTML =
      '<p><em>' + c.excerpt + '</em></p>' + results + (c.content || '');
  }
})();
</script>
</body>
</html>
